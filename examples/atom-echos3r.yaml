substitutions:
  name: atom-bureau
  friendly_name: "Atom Bureau"
  vban_stream_name: "AtomBureau"   # ← changer par pièce (AtomSalon, etc.)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret atom_bureau_api_key

ota:
  - platform: esphome
    password: !secret atom_bureau_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret atom_ap_password

captive_portal:

external_components:
  - source: github://powange/esphome-vban
    components: [vban_sender]
    refresh: 0s

# ─── Alim codec ES8311 (GPIO18 doit être ON) ─────────────────
switch:
  - platform: gpio
    pin: GPIO18
    id: codec_enable
    restore_mode: ALWAYS_ON

# ─── I2C (codec ES8311) ──────────────────────────────────────
i2c:
  - id: bus_a
    sda: GPIO45
    scl: GPIO0
    frequency: 100kHz

# ─── I2S ─────────────────────────────────────────────────────
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO11

# ─── Codec ES8311 (natif ESPHome) ────────────────────────────
audio_dac:
  - platform: es8311
    id: es8311_codec
    i2c_id: bus_a
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true

# ─── Microphone ──────────────────────────────────────────────
microphone:
  - platform: i2s_audio
    id: atom_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

# ─── Speaker (sortie Home Assistant) ─────────────────────────
speaker:
  - platform: i2s_audio
    id: atom_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO48
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    audio_dac: es8311_codec

media_player:
  - platform: speaker
    name: "Speaker"
    id: atom_media_player
    announcement_pipeline:
      speaker: atom_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1

# ─── VBAN multicast sender ───────────────────────────────────
vban_sender:
  id: vban
  microphone: atom_mic
  target_ip: "192.168.0.255"  # broadcast du subnet (tous les receivers du LAN)
  target_port: 6980
  stream_name: ${vban_stream_name}
  gain: 1.0                  # amplification logicielle (mic Atom Echo tres faible)
