substitutions:
  name: atom-bureau
  friendly_name: "Atom Bureau"
  vban_stream_name: "AtomBureau"   # ← changer par pièce (AtomSalon, etc.)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - switch.turn_on: speaker_enable

esp32:
  board: esp32s3box
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 8MB
  sdkconfig_options:
    CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [es8311]
  - source: github://powange/esphome-vban
    components: [vban_sender]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret atom_ap_password

captive_portal:

api:
  encryption:
    key: !secret atom_bureau_api_key

ota:
  - platform: esphome
    password: !secret atom_bureau_ota_password

logger:

# ─── Bouton physique ─────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      mode: INPUT_PULLUP
      inverted: true
    id: user_button
    name: "Bouton ${friendly_name}"

# ─── Speaker Enable ──────────────────────────────────────────
switch:
  - platform: gpio
    pin: GPIO18
    id: speaker_enable
    name: "Speaker Enable"
    restore_mode: ALWAYS_ON

# ─── I2C (ES8311 codec) ──────────────────────────────────────
i2c:
  sda: GPIO45
  scl: GPIO0
  frequency: 50000Hz

# ─── ES8311 Audio Codec ──────────────────────────────────────
es8311:
  id: es8311_codec
  use_mclk: true
  use_microphone: true
  sample_rate: 16000
  bits_per_sample: 16

# ─── I2S Audio ───────────────────────────────────────────────
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
    i2s_mclk_pin: GPIO9

# ─── Microphone ──────────────────────────────────────────────
microphone:
  - platform: i2s_audio
    id: atom_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left

# ─── Speaker (media_player pour annonces HA) ─────────────────
speaker:
  - platform: i2s_audio
    id: atom_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO48
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

media_player:
  - platform: speaker
    name: "${friendly_name} Speaker"
    id: atom_media_player
    speaker: atom_speaker

# ─── VBAN Multicast ──────────────────────────────────────────
# Le composant s'abonne automatiquement au micro et démarre la capture.
vban_sender:
  id: vban
  microphone: atom_mic
  target_ip: "239.0.0.1"    # multicast : tous les receivers reçoivent
  target_port: 6980
  stream_name: ${vban_stream_name}
